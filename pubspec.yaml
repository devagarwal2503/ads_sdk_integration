name: ads_sdk_integration
description: "Build a demo Android application that fetches, renders, and tracks display banner ads using the Osmos Ads system."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get_it: ^9.2.1
  osmos_flutter_plugin: ^2.6.1
  visibility_detector: ^0.4.0+2
  cached_network_image: ^3.4.1
  logger: ^2.7.0
  url_launcher: ^6.3.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
